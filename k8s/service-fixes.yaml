apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
spec:
  ports:
  - nodePort: 30868
    port: 80
    protocol: TCP
    targetPort: 9000
  selector:
    app: frontend
  type: NodePort

---
apiVersion: v1
kind: Service
metadata:
  name: details
  namespace: default
spec:
  ports:
  - name: http
    port: 9080
    protocol: TCP
    targetPort: 4000
  selector:
    app: details
  type: ClusterIP
