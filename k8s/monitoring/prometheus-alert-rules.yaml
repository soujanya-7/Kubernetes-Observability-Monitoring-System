apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: monitoring
data:
  alert-rules.yml: |
    groups:
      - name: pinger.rules
        rules:

          # Alert when a service is completely unreachable
          - alert: PingerServiceDown
            expr: up{job=~"frontend|details|pinger-v1|pinger-v2"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is DOWN"
              description: "Prometheus cannot scrape {{ $labels.job }} for more than 1 minute. Pod may be crashed or evicted."

          # Alert when failure rate exceeds 20%
          - alert: HighPingFailureRate
            expr: |
              rate(pinger_fail_total[5m])
              /
              (rate(pinger_success_total[5m]) + rate(pinger_fail_total[5m])) > 0.20
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High ping failure rate detected"
              description: "More than 20% of pings are failing in the last 5 minutes. Current rate: {{ $value | humanizePercentage }}"

          # Alert when failure rate exceeds 50%
          - alert: CriticalPingFailureRate
            expr: |
              rate(pinger_fail_total[5m])
              /
              (rate(pinger_success_total[5m]) + rate(pinger_fail_total[5m])) > 0.50
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Critical ping failure rate — more than 50% failing"
              description: "Over half of all pings are failing. Immediate attention required. Rate: {{ $value | humanizePercentage }}"

          # Alert when HTTP request latency p95 exceeds 1s
          - alert: HighRequestLatency
            expr: |
              histogram_quantile(0.95,
                rate(http_request_duration_ms_bucket[5m])
              ) > 1000
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "High p95 HTTP latency on {{ $labels.job }}"
              description: "95th percentile latency is {{ $value }}ms (threshold: 1000ms) on {{ $labels.job }}"

          # Alert when Node.js heap memory exceeds 100MB
          - alert: HighMemoryUsage
            expr: nodejs_heap_size_used_bytes > 100 * 1024 * 1024
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High Node.js heap usage on {{ $labels.job }}"
              description: "Heap used is {{ $value | humanize }}B (threshold: 100MB). Pod may be leaking memory."

          # Alert when pod restarts frequently
          - alert: PodCrashLooping
            expr: |
              rate(kube_pod_container_status_restarts_total{namespace="default"}[10m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is crash-looping"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted more than once in the last 10 minutes."
