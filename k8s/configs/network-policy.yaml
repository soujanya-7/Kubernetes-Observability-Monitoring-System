# -----------------------------------------------
# NetworkPolicy — restrict traffic between pods
# Only allow explicitly defined service-to-service
# communication. Deny everything else by default.
# -----------------------------------------------

# Default deny all ingress/egress for the default namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: default
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow frontend to call pinger-v1, pinger-v2, and details
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Egress
  egress:
    # Allow calling pinger services
    - to:
        - podSelector:
            matchLabels:
              app: pinger
      ports:
        - protocol: TCP
          port: 3000
    # Allow calling details service
    - to:
        - podSelector:
            matchLabels:
              app: details
      ports:
        - protocol: TCP
          port: 4000
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53

---
# Allow ingress to frontend from anywhere (user traffic)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 9000

---
# Allow Prometheus (monitoring namespace) to scrape all app pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: default
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              purpose: observability
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 4000
        - protocol: TCP
          port: 9000

---
# Allow pinger to make outbound HTTP calls (to ping URLs)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-pinger-egress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: pinger
  policyTypes:
    - Egress
    - Ingress
  egress:
    # Allow pinger to call any external HTTP/HTTPS URL
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
  ingress:
    # Allow frontend to call pinger
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 3000
